            text-align: center;

        .item-descarga a {
            text-decoration: none;
            color: #333333;
            display: block;
            outline: none;
        }

            border: 4px solid transparent; /* Borde un poco más grueso */
            border-radius: 20px; /* Esquinas más redondeadas */
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .item-descarga a:hover img {
            border-color: #aeea00;
            background-color: #f4fce8;
            transform: scale(1.05); /* Pequeño efecto de zoom si lo ven desde PC */
        }

        .item-descarga span {
            display: block;
            font-size: 16px; /* Letra más grande (Antes 14px) */
            font-weight: bold;
        }
